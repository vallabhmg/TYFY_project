{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LMS | Student Login</title>
    <link rel="stylesheet" href="{% static 'style.css' %}">
    <link rel="stylesheet" href="{% static 'lms_login.css' %}">

</head>
<body style="background: #e9ecef; display: flex; align-items: center; justify-content: center; height: 100vh;">

    <div style="background: white; padding: 40px; border-radius: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center;">
        <h2 style="color: #2c3e50; margin-bottom: 10px;">LMS Portal</h2>
        <p style="color: #7f8c8d; margin-bottom: 30px;">Please login to access your courses</p>

        <form id="lmsLoginForm" action="{% url 'lms_dashboard' %}" method="GET">
    <input type="email" id="lmsEmail" placeholder="Email" required class="lms-input">
    
    <input type="password" id="lmsPassword" placeholder="Password" 
           minlength="8" maxlength="16" required class="lms-input">
    
    <button type="submit" class="btn-lms-login">Login</button>
</form>
        
        <p style="margin-top: 20px; font-size: 0.8rem; color: #888;">Forgot password? Contact Admin</p>
    </div>
<script src="{% static 'js/lms_login.js' %}"></script>
</body>
</html>
