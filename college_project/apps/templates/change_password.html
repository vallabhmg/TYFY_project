{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password | Vikas Education</title>
    
    <link rel="stylesheet" href="{% static 'style.css' %}">
    <link rel="stylesheet" href="{% static 'change_password.css' %}">
</head>
<body>

<div class="password-page-wrapper">
    <div class="password-card">
        <h2>Change Account Password</h2>
        
        <form id="passwordChangeForm" action="/update-password" method="POST">
    <div class="input-field">
        <label>Username</label>
        <input type="text" id="username" name="username" placeholder="Enter Username" class="lms-input" required>
    </div>

    <div class="input-field">
        <label>Current Password</label>
        <input type="password" id="currentPassword" name="current_password" placeholder="••••••••" class="lms-input" required>
    </div>

<div class="input-field">
    <label>Updated Password</label>
    <div class="password-wrapper">
        <input type="password" id="newPassword" name="new_password" placeholder="New Password" class="lms-input" required>
        <span class="toggle-eye" onclick="togglePasswordVisibility('newPassword')">👁️</span>
    </div>
    <small class="error-text" id="passError"></small>
</div>

<div class="input-field">
    <label>Confirm Password</label>
    <div class="password-wrapper">
        <input type="password" id="confirmPassword" name="confirm_password" placeholder="Confirm New Password" class="lms-input" required>
        <span class="toggle-eye" onclick="togglePasswordVisibility('confirmPassword')">👁️</span>
    </div>
    <small class="error-text" id="matchError"></small>
</div>

    <button type="submit" class="btn-update-password">
        Update Password
    </button>
</form>
    </div>
</div>

<script src="{% static 'js/script.js' %}"></script>
    <script src="{% static 'js/change_password.js' %}"></script>

</body>
</html>
