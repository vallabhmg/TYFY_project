{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Question Papers | Vikas Education</title>
    
    <link rel="stylesheet" href="{% static 'style.css' %}">
    <link rel="stylesheet" href="{% static 'question_papers.css' %}">
</head>
<body>

<div id="section-question-papers">
    <div class="qp-container">
        
        <div class="qp-header">
            <h2>📖 Question Papers Repository</h2>
        </div>

        <div class="qp-search-wrapper">
            <input type="text" id="qpSearchInput" 
                   placeholder="🔍 Search for Question Papers (e.g. BCA Sem 3, Java, DBMS)...">
        </div>

        <div class="qp-table-wrapper">
            <table class="repo-table" id="qpTable">
                <thead>
                    <tr>
                        <th>Sr. No.</th>
                        <th>Question Paper Title</th>
                        <th style="text-align: center;">Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>1</td>
                        <td class="qp-title">BCA Semester 1 - Computer Fundamentals</td>
                        <td class="action-cell">
                            <a href="#" download class="btn-download">Download ↓</a>
                        </td>
                    </tr>
                    <tr>
                        <td>2</td>
                        <td class="qp-title">BCA Semester 3 - Core Java</td>
                        <td class="action-cell">
                            <a href="#" download class="btn-download">Download ↓</a>
                        </td>
                    </tr>
                    <!-- Add more rows as needed -->
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="{% static 'js/script.js' %}"></script>
<script src="{% static 'js/question_papers.js' %}"></script>

</body>
</html>
