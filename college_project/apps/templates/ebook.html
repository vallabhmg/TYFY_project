
{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Books | Vikas Education</title>
    
    <link rel="stylesheet" href="{% static 'style.css' %}">
    <link rel="stylesheet" href="{% static 'ebook.css' %}">
</head>
<body>

    <div id="section-ebook">
        <div class="ebook-container">
            
            <div class="ebook-header">
                <h2>📖 E-Books Repository</h2>
            </div>

            <div class="ebook-search-wrapper">
                <input type="text" id="ebookSearchInput" 
                       placeholder="🔍 Search for Textbooks (e.g. Java, Python, SQL)...">
            </div>

            <!-- Single Table with both thead and tbody -->
            <div class="ebook-table-wrapper">
                <table class="ebook-table" id="ebookTable">
                    <thead>
                        <tr>
                            <th>Sr. No.</th>
                            <th>Textbook Title</th>
                            <th style="text-align: center;">Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr data-label-sr="1">
                            <td>1</td>
                            <td>Core Java - Complete Reference (12th Edition)</td>
                            <td class="action-cell">
                                <a href="#" download class="btn-download">Download ↓</a>
                            </td>
                        </tr>
                        <tr data-label-sr="2">
                            <td>2</td>
                            <td>Python for Data Analysis</td>
                            <td class="action-cell">
                                <a href="#" download class="btn-download">Download ↓</a>
                            </td>
                        </tr>
                        <tr data-label-sr="3">
                            <td>2</td>
                            <td>Python for Data Analysis</td>
                            <td class="action-cell">
                                <a href="#" download class="btn-download">Download ↓</a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="{% static 'js/script.js' %}"></script>
    <script src="{% static 'js/ebook.js' %}"></script>
</body>
</html>
