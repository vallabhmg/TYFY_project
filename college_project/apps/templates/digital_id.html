{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital ID Card - Vikas Education LMS</title>
    
    <link rel="stylesheet" href="{% static 'style.css' %}">
    <link rel="stylesheet" href="{% static 'digital_id.css' %}">
</head>
<body>

<div id="id-portal" class="lms-content-wrapper">
    
    <!-- Login / Verification Box -->
    <div id="id-login-box" class="id-verification-box">
        <h3>ID Card Verification</h3>
        
        <input type="text" id="idNumInput" class="lms-input" placeholder="Enter College ID (BCA-101)">
        
        <input type="password" id="idPassInput" class="lms-input" placeholder="Enter Security Password">
        
        <button onclick="verifyAndShowID()" class="btn-lms-login btn-verify">
            Verify & Generate
        </button>
        
        <p class="hint">Default Security Password: <strong>12345</strong></p>
    </div>

    <!-- Final Digital ID Card -->
    <div id="final-id-card">
        <div class="id-card-container">
            <div class="id-card-header">
                <h4>VIKAS EDUCATION</h4>
                <p>DIGITAL IDENTITY CARD</p>
            </div>
            
            <div class="id-card-body">
                <div class="profile-circle">👤</div>
                <h3 id="display-id-name">ABC STUDENT</h3>
                <p class="department">BCA DEPARTMENT</p>
                <hr>
                <p><b>ID NO:</b> <span id="display-id-val"></span></p>
                <p><b>VALIDITY:</b> 2024-2027</p>
            </div>
            
            <div class="id-card-footer">
                Verified Digital Copy
            </div>
        </div>
        
        <button onclick="resetIdPortal()" class="btn-reset">Generate Another ID</button>
    </div>
</div>

<script src="{% static 'js/script.js' %}"></script>
<script src="{% static 'js/digital_id.js' %}"></script>

</body>
</html>
